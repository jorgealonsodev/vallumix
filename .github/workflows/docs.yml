name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Override pinned toolchain for docs tools
        run: rustup override set stable

      - name: Install mdBook and plugins
        run: |
          cargo install mdbook --version 0.4.43 --locked
          cargo install mdbook-mermaid --version 0.14.0 --locked
          cargo install mdbook-admonish --version 1.18.0 --locked

      - name: Install mdbook-admonish assets
        run: |
          cd docs/es && mdbook-admonish install
          cd docs/en && mdbook-admonish install

      - name: Build Spanish docs
        run: mdbook build docs/es

      - name: Build English docs
        run: mdbook build docs/en

      - name: Build Rust API docs
        run: |
          cargo doc --workspace --no-deps --all-features
          mkdir -p site/api
          cp -r target/doc/* site/api/
          cat > site/api/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=vallumix/index.html">
              <title>Vallumix API Docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="vallumix/index.html">vallumix API docs</a>...</p>
            </body>
          </html>
          EOF

      - name: Assemble site
        run: |
          mkdir -p site/en site/es
          cp -r docs/es/book/* site/
          cp -r docs/en/book/* site/en/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
