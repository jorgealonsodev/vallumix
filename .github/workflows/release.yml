name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches Cargo.toml version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cargo-deb, cargo-generate-rpm, upx
        run: |
          cargo install cargo-deb cargo-generate-rpm
          sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build release binary
        run: cross build --target ${{ matrix.target }} --release -p vallumix-cli

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/vallumix || true

      - name: Compress with UPX
        run: |
          upx --best --strip-relocs=0 target/${{ matrix.target }}/release/vallumix || true

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/vallumix vallumix-${{ matrix.target }}

      - name: Generate packages (x86_64 deb)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cargo deb --release --target ${{ matrix.target }} -p vallumix-cli || true
          cp target/${{ matrix.target }}/debian/*.deb ./ || true

      - name: Generate packages (aarch64 rpm)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          cargo generate-rpm --target ${{ matrix.target }} -p vallumix-cli || true
          cp target/${{ matrix.target }}/generate-rpm/*.rpm ./ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vallumix-${{ matrix.target }}
          path: |
            vallumix-${{ matrix.target }}
            *.deb
            *.rpm

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Generate CycloneDX SBOM
        run: |
          cargo sbom --output-format cyclonedx-json -p vallumix-cli > vallumix-sbom-1.0.0.cdx.json || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: vallumix-sbom-*.cdx.json

  release:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vallumix-*

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cp sbom/*.cdx.json release/ || true
          cd release
          sha256sum * > SHA256SUMS

      - name: Generate artifact hashes for SLSA
        id: hash
        run: |
          cd release
          sha256sum * > hashes.txt
          echo "hashes=$(base64 -w0 hashes.txt)" >> "$GITHUB_OUTPUT"

      - name: Sign release artifacts with cosign
        run: |
          cd release
          for file in *; do
            cosign sign-blob --yes "$file" --output-signature="${file}.sig" --output-certificate="${file}.cert"
          done

      - name: Verify cosign signatures
        run: |
          cd release
          for file in vallumix-* *.deb *.rpm *.cdx.json SHA256SUMS; do
            if [ -f "$file.sig" ]; then
              cosign verify-blob --certificate "$file.cert" --signature "$file.sig" --certificate-oidc-issuer https://token.actions.githubusercontent.com --certificate-identity-regexp 'https://github.com/jorgealonsodev/vallumix/.github/workflows/release.yml@refs/tags/.*' "$file" || true
            fi
          done

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \\[$VERSION\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md > RELEASE_NOTES.md || echo "No changelog section found" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: release/*

  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
      provenance-name: "vallumix-provenance.intoto.jsonl"

  publish-crates:
    needs: [release, provenance]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo publish dry-run
        run: |
          cargo publish -p vallumix-cli --dry-run

      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p vallumix-cli
