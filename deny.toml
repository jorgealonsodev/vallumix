[graph]
targets = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "ISC", "Unicode-3.0"]
confidence-threshold = 0.8

[advisories]
version = 2
yanked = "warn"
# Temporary, narrowly-scoped exception to keep CI strict while upstream catches up.
ignore = [
  { id = "RUSTSEC-2025-0119", reason = "Temporary CI unblock; track upstream fix and remove once patched release is available" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
